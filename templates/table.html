<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ title }}</title>
<style>body{background:#0d1117;color:#e6edf3;font-family:system-ui,sans-serif;padding:24px;max-width:520px;margin:0 auto}a{color:#58a6ff;text-decoration:none}a:hover{text-decoration:underline}h1{margin-bottom:20px;font-weight:600}table{border-collapse:collapse;width:100%;border:1px solid #30363d;border-radius:6px;overflow:hidden}th,td{border:1px solid #30363d;padding:10px 12px;text-align:left}th{background:#161b22;color:#8b949e;font-weight:500}td:nth-child(1),td:nth-child(3),td:nth-child(4){text-align:center}tr:nth-child(even){background:#161b22}.meta{margin-top:20px;font-size:0.85rem;color:#8b949e}.error{color:#f85149}</style>
</head>
<body>
<p><a href="index.html">← Back</a></p>
<h1>{{ title }}</h1>
{% if error %}
<p class="error">Error loading table: {{ error }}</p>
{% elif rows %}
<table>
<thead><tr><th>Pos</th><th>Team</th><th>P</th><th>Pts</th></tr></thead>
<tbody>
{% for r in rows %}
<tr>
<td>{{ r.position or '' }}</td>
<td>{{ r.team or '' }}</td>
<td>{{ r.played or '' }}</td>
<td>{{ r.points or '' }}</td>
</tr>
{% endfor %}
</tbody>
</table>
{% else %}
<p>Table data not available.</p>
{% endif %}
<p class="meta">Last updated {{ last_updated }}</p>
</body>
</html>
