# Daily scheduler that fetches fixtures and updates the scraper workflow schedule
name: Update Scraper Schedule

on:
  schedule:
    # Run daily at 2am UTC to set up the day's scraping schedule
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 jinja2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch fixtures and update schedule
        run: python schedule_scraper.py

      - name: Check for changes and commit
        run: |
          # Check if schedule.json changed
          if git diff --quiet .github/schedule.json 2>/dev/null; then
            schedule_changed=false
          else
            schedule_changed=true
          fi
          
          # Check if status page exists or changed
          if [ -f docs/status.html ]; then
            if git diff --quiet docs/status.html 2>/dev/null; then
              status_changed=false
            else
              status_changed=true
            fi
          else
            status_changed=true
          fi
          
          # Commit and push if anything changed
          if [ "$schedule_changed" = "true" ] || [ "$status_changed" = "true" ]; then
            git add .github/schedule.json
            if [ -f docs/status.html ]; then
              git add docs/status.html
            fi
            git commit -m "Update scraper schedule and status page for $(date +%Y-%m-%d) [skip ci]" || exit 0
            git push
          else
            echo "No changes to commit."
          fi
