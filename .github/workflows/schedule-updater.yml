# Daily scheduler that fetches fixtures and updates the scraper workflow schedule
name: Update Scraper Schedule

on:
  schedule:
    # Run daily at 2am UTC to set up the day's scraping schedule
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 jinja2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch fixtures and update schedule
        run: python schedule_scraper.py

      - name: Check for status page changes
        id: check-status
        run: |
          if git diff --quiet docs/status.html 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit status page if changed
        if: steps.check-status.outputs.changed == 'true'
        run: |
          git add docs/status.html
          git commit -m "Update status page" || true

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet .github/schedule.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git add .github/schedule.json
          git commit -m "Update scraper schedule for $(date +%Y-%m-%d)"
          git push
