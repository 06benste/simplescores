# Scrape scores/tables, update HTML in docs/, push to GitHub.
# Enable GitHub Pages from branch main, folder /docs.
name: Update scores & tables

on:
  schedule:
    # This schedule is auto-updated daily at 2am UTC by the schedule-updater workflow
    # which fetches today's fixtures and sets up the appropriate cron schedule.
    # Default fallback schedule (will be replaced):
    - cron: '*/30 14-22 * * 0,6'
    - cron: '*/30 18-22 * * 2,3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Scrape, render HTML, and push
        run: python scrape_and_publish.py
        env:
          GIT_AUTHOR_NAME: 'github-actions[bot]'
          GIT_AUTHOR_EMAIL: 'github-actions[bot]@users.noreply.github.com'
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
