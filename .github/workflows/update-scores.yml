# Scrape scores/tables, update HTML in docs/, push to GitHub.
# Enable GitHub Pages from branch main, folder /docs.
name: Update scores & tables

on:
  schedule:
    # Run every 10 minutes during typical match hours (10:00-23:59 UTC)
    # The script will check schedule.json to see if it should actually run at this time
    # This allows dynamic scheduling based on actual fixture times while minimizing wasted runs
    - cron: '*/10 10-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check schedule and run scraper
        run: |
          python -c "
          import json
          import sys
          import os
          from datetime import datetime, timezone, date
          from pathlib import Path
          
          # Check if this is a manual workflow_dispatch trigger
          # GITHUB_EVENT_NAME will be 'workflow_dispatch' for manual runs
          github_event = os.environ.get('GITHUB_EVENT_NAME', '')
          is_manual = github_event == 'workflow_dispatch'
          
          if is_manual:
              print('⚠ Manual workflow trigger detected - bypassing schedule checks.')
              print('Running scraper regardless of schedule.')
              sys.exit(0)
          
          schedule_file = Path('.github/schedule.json')
          if not schedule_file.exists():
              print('No schedule file found. Running scraper anyway.')
              sys.exit(0)
          
          try:
              schedule = json.loads(schedule_file.read_text())
          except Exception as e:
              print(f'Error reading schedule file: {e}. Running scraper anyway.')
              sys.exit(0)
          
          # Check if schedule is for today
          if schedule.get('date') != date.today().isoformat():
              print(f'Schedule is for {schedule.get(\"date\")}, not today. Skipping.')
              sys.exit(1)
          
          # Check current time
          now = datetime.now(timezone.utc)
          current_time = (now.hour, now.minute)
          rounded_minute = (current_time[1] // 10) * 10
          current_time_rounded = (current_time[0], rounded_minute)
          
          # Check if there are any games scheduled
          has_games = schedule.get('has_games', False)
          run_times = schedule.get('run_times', [])
          run_times_tuples = [tuple(rt) if isinstance(rt, list) else rt for rt in run_times]
          
          print(f'Current UTC time: {now.strftime(\"%H:%M:%S\")}')
          print(f'Rounded time (to 10 min): {current_time_rounded}')
          print(f'Has games scheduled: {has_games}')
          print(f'Total scheduled times: {len(run_times_tuples)}')
          
          if has_games and run_times_tuples:
              # We have a specific schedule - check if we should run
              print(f'First 5 scheduled times: {run_times_tuples[:5]}')
              print(f'Last 5 scheduled times: {run_times_tuples[-5:]}')
              
              if current_time_rounded in run_times_tuples:
                  print(f'✓ Current time {current_time_rounded} matches schedule exactly. Running scraper.')
                  sys.exit(0)
              else:
                  # Check if we're within the scheduled window using start_time and end_time
                  # This is more accurate than using min/max of run_times
                  start_time = schedule.get('start_time')
                  end_time = schedule.get('end_time')
                  
                  if start_time and end_time:
                      # Convert to tuples if they're lists
                      start_tuple = tuple(start_time) if isinstance(start_time, list) else start_time
                      end_tuple = tuple(end_time) if isinstance(end_time, list) else end_time
                      
                      current_minutes = current_time_rounded[0] * 60 + current_time_rounded[1]
                      start_minutes = start_tuple[0] * 60 + start_tuple[1]
                      end_minutes = end_tuple[0] * 60 + end_tuple[1]
                      
                      print(f'Schedule window: {start_tuple} to {end_tuple}')
                      
                      if start_minutes <= current_minutes <= end_minutes:
                          print(f'✓ Current time {current_time_rounded} is within scheduled window ({start_tuple} to {end_tuple}). Running scraper.')
                          sys.exit(0)
                      else:
                          print(f'✗ Current time {current_time_rounded} is outside scheduled window ({start_tuple} to {end_tuple}). Skipping.')
                          sys.exit(1)
                  else:
                      # Fallback to min/max of run_times if start/end_time not available
                      earliest = min(run_times_tuples)
                      latest = max(run_times_tuples)
                      
                      current_minutes = current_time_rounded[0] * 60 + current_time_rounded[1]
                      earliest_minutes = earliest[0] * 60 + earliest[1]
                      latest_minutes = latest[0] * 60 + latest[1]
                      
                      if earliest_minutes <= current_minutes <= latest_minutes:
                          print(f'✓ Current time {current_time_rounded} is within scheduled window ({earliest} to {latest}). Running scraper.')
                          sys.exit(0)
                      else:
                          print(f'✗ Current time {current_time_rounded} not in scheduled window ({earliest} to {latest}). Skipping.')
                          sys.exit(1)
          else:
              # No games scheduled, but run during typical match hours as fallback
              # This ensures we catch games even if scheduler didn't find fixtures
              current_hour = current_time[0]
              if 12 <= current_hour <= 22:  # 12:00-22:59 UTC (typical match hours)
                  # Run every 30 minutes during fallback hours to save GitHub Actions minutes
                  if current_time[1] in [0, 30]:
                      print(f'⚠ No games scheduled, but running fallback check at {current_time_rounded} (typical match hours).')
                      sys.exit(0)
                  else:
                      print(f'✗ No games scheduled, skipping non-30-min interval {current_time_rounded}.')
                      sys.exit(1)
              else:
                  print(f'✗ No games scheduled and outside typical match hours (12:00-22:59 UTC). Skipping.')
                  sys.exit(1)
          "
      
      - name: Scrape, render HTML, and push
        run: python scrape_and_publish.py
        env:
          GIT_AUTHOR_NAME: 'github-actions[bot]'
          GIT_AUTHOR_EMAIL: 'github-actions[bot]@users.noreply.github.com'
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
