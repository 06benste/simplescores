# Scrape scores/tables, update HTML in docs/, push to GitHub.
# Enable GitHub Pages from branch main, folder /docs.
name: Update scores & tables

on:
  schedule:
    # Run every 10 minutes during typical match hours (10:00-23:59 UTC)
    # The script will check schedule.json to see if it should actually run at this time
    # This allows dynamic scheduling based on actual fixture times while minimizing wasted runs
    - cron: '*/10 10-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check schedule and run scraper
        run: |
          python -c "
          import json
          import sys
          from datetime import datetime, timezone, date
          from pathlib import Path
          
          schedule_file = Path('.github/schedule.json')
          if not schedule_file.exists():
              print('No schedule file found. Running scraper anyway.')
              sys.exit(0)
          
          try:
              schedule = json.loads(schedule_file.read_text())
          except Exception as e:
              print(f'Error reading schedule file: {e}. Running scraper anyway.')
              sys.exit(0)
          
          # Check if schedule is for today
          if schedule.get('date') != date.today().isoformat():
              print(f'Schedule is for {schedule.get(\"date\")}, not today. Skipping.')
              sys.exit(1)
          
          # Check if there are any games scheduled
          if not schedule.get('has_games', False):
              print('No games scheduled for today. Skipping.')
              sys.exit(1)
          
          # Check if we should run now
          now = datetime.now(timezone.utc)
          current_time = (now.hour, now.minute)
          
          # Round current minute to nearest 10 (since we run every 10 min)
          rounded_minute = (current_time[1] // 10) * 10
          current_time_rounded = (current_time[0], rounded_minute)
          
          run_times = schedule.get('run_times', [])
          # Convert run_times to tuples for comparison (they're stored as lists in JSON)
          run_times_tuples = [tuple(rt) if isinstance(rt, list) else rt for rt in run_times]
          
          if current_time_rounded in run_times_tuples:
              print(f'Current time {current_time_rounded} matches schedule. Running scraper.')
              sys.exit(0)
          else:
              print(f'Current time {current_time_rounded} not in schedule {run_times_tuples}. Skipping.')
              sys.exit(1)
          "
      
      - name: Scrape, render HTML, and push
        run: python scrape_and_publish.py
        env:
          GIT_AUTHOR_NAME: 'github-actions[bot]'
          GIT_AUTHOR_EMAIL: 'github-actions[bot]@users.noreply.github.com'
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
