# Scrape scores/tables, update HTML in docs/, push to GitHub.
# Enable GitHub Pages from branch main, folder /docs.
name: Update scores & tables

on:
  schedule:
    # Match days only: Weekends (Sat/Sun) + Midweek match days (Tue/Wed)
    # Weekends: 14:00-22:00 UTC (covers 2pm-10pm UK time, typical match window)
    # ~17 runs/day × 2 days = 34 runs/weekend
    - cron: '*/30 14-22 * * 0,6'
    # Midweek matches: 18:00-22:00 UTC (covers 6pm-10pm UK time)
    # ~9 runs/day × 2 days = 18 runs/week
    - cron: '*/30 18-22 * * 2,3'
    # Total: ~52 runs/week × 4.33 weeks = ~225 runs/month × 60s = ~225 minutes/month (well within free tier)
  workflow_dispatch:

# Note: GitHub Actions cron cannot dynamically adjust based on actual game times.
# For dynamic scheduling (start at earliest game, end 115min after last game + final update 2.5h later),
# you would need an external scheduler or a workflow that checks game schedules and triggers accordingly.

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Scrape, render HTML, and push
        run: python scrape_and_publish.py
        env:
          GIT_AUTHOR_NAME: 'github-actions[bot]'
          GIT_AUTHOR_EMAIL: 'github-actions[bot]@users.noreply.github.com'
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
